apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vai-server-secret-global-staging
  annotations:
    force-sync: 0
  labels:
    app: vai-server-secret-global-staging
    environment: production
spec:
  refreshInterval: 10m
  secretStoreRef:
    name: vault-kv-prod
    kind: ClusterSecretStore
  target:
    name: vai-server-secret-global-staging
  dataFrom:
    - extract:
        key: /VAI_STAGING
